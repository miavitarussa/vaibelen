<style>
  .cd-contacts {
    background: transparent;
    min-height: 60vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    font-family: Arial, sans-serif;
    position: relative;
    overflow: hidden;
  }

  .cd-contacts::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(78, 201, 168, 0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(78, 201, 168, 0.06) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .cd-contacts__title {
    color: #ffffff;
    font-size: 52px;
    font-weight: 700;
    text-align: center;
    margin: 0 0 24px 0;
    letter-spacing: -1px;
    position: relative;
  }

  .cd-contacts__subtitle {
    display: none;
  }

  .cd-contacts__cards {
    display: flex;
    gap: 16px;
    flex-wrap: nowrap;
    justify-content: center;
    position: relative;
    width: 100%;
    max-width: 860px;
  }

  .cd-contacts__card {
    background: linear-gradient(145deg, #052420, #062e27);
    border: 1px solid rgba(78, 201, 168, 0.3);
    border-radius: 16px;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    transition: all 0.35s ease;
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .cd-contacts__card::before {
    content: '';
    position: absolute;
    top: -60px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 120px;
    background: radial-gradient(circle, rgba(78, 201, 168, 0.12), transparent 70%);
    transition: all 0.35s ease;
  }

  .cd-contacts__card:hover {
    border-color: rgba(78, 201, 168, 0.5);
    transform: translateY(-6px);
    box-shadow:
      0 16px 48px rgba(26, 90, 70, 0.35),
      0 0 0 1px rgba(78, 201, 168, 0.1) inset;
  }

  .cd-contacts__card:hover::before {
    top: -30px;
    opacity: 1.5;
  }

  .cd-contacts__icon {
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, #1e5c45, #236b51);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(78, 201, 168, 0.2);
  }

  .cd-contacts__icon svg {
    width: 28px;
    height: 28px;
    fill: #4ec9a8;
  }

  .cd-contacts__label {
    color: #4ec9a8;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 600;
  }

  .cd-contacts__value {
    color: #ffffff;
    font-size: 17px;
    font-weight: 600;
  }

  .cd-contacts__arrow {
    color: #2a5a48;
    font-size: 18px;
    transition: all 0.3s ease;
    margin-top: 4px;
  }

  .cd-contacts__card:hover .cd-contacts__arrow {
    color: #4ec9a8;
    transform: translateX(4px);
  }
</style>
