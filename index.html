<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit=cover — убирает белые полосы на iPhone с notch -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0b0b17">
  <title>Портфель жизни</title>

  <!-- Telegram Web App SDK — обязательно до всех скриптов -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Шрифты: Syne для заголовков, DM Sans для текста -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Экран загрузки (виден пока JS инициализируется) -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-content">
      <div class="loading-radar">
        <svg viewBox="0 0 120 120" width="120" height="120">
          <defs>
            <radialGradient id="radarGlow" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#6c4bff" stop-opacity="0.3"/>
              <stop offset="100%" stop-color="#6c4bff" stop-opacity="0"/>
            </radialGradient>
          </defs>
          <!-- Фоновое свечение -->
          <circle cx="60" cy="60" r="58" fill="url(#radarGlow)"/>
          <!-- Концентрические кольца -->
          <polygon class="radar-ring" points="60,18 81,29 92,52 81,75 60,86 39,75 28,52 39,29" fill="none" stroke="rgba(108,75,255,0.15)" stroke-width="1"/>
          <polygon class="radar-ring" points="60,30 75,38 82,52 75,66 60,74 45,66 38,52 45,38" fill="none" stroke="rgba(108,75,255,0.25)" stroke-width="1"/>
          <polygon class="radar-ring" points="60,42 70,48 74,52 70,62 60,68 50,62 46,52 50,48" fill="none" stroke="rgba(108,75,255,0.4)" stroke-width="1"/>
          <!-- Оси -->
          <line x1="60" y1="18" x2="60" y2="86" stroke="rgba(108,75,255,0.2)" stroke-width="0.5"/>
          <line x1="28" y1="52" x2="92" y2="52" stroke="rgba(108,75,255,0.2)" stroke-width="0.5"/>
          <line x1="39" y1="29" x2="81" y2="75" stroke="rgba(108,75,255,0.2)" stroke-width="0.5"/>
          <line x1="81" y1="29" x2="39" y2="75" stroke="rgba(108,75,255,0.2)" stroke-width="0.5"/>
          <!-- Заполненный радар -->
          <polygon class="radar-fill" points="60,30 74,40 80,56 72,68 60,72 48,68 40,56 46,40" fill="rgba(108,75,255,0.2)" stroke="#6c4bff" stroke-width="1.5"/>
          <!-- Точки на вершинах -->
          <circle cx="60" cy="30" r="2.5" fill="#6c4bff"/>
          <circle cx="74" cy="40" r="2.5" fill="#6c4bff"/>
          <circle cx="80" cy="56" r="2.5" fill="#6c4bff"/>
          <circle cx="72" cy="68" r="2.5" fill="#6c4bff"/>
          <circle cx="60" cy="72" r="2.5" fill="#6c4bff"/>
          <circle cx="48" cy="68" r="2.5" fill="#6c4bff"/>
          <circle cx="40" cy="56" r="2.5" fill="#6c4bff"/>
          <circle cx="46" cy="40" r="2.5" fill="#6c4bff"/>
          <!-- Центр -->
          <circle cx="60" cy="52" r="4" fill="#6c4bff" opacity="0.8"/>
        </svg>
      </div>
      <div class="loading-title">Портфель жизни</div>
      <div class="loading-subtitle">Твой путь к балансу</div>
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- Основной контейнер приложения (скрыт до инициализации) -->
  <div id="app" class="app hidden">

    <!-- Контейнер для экранов — JS рендерит сюда HTML каждого экрана -->
    <div id="screen-container" class="screen-container"></div>

    <!-- Нижняя навигация (5 табов, скрыта на онбординге) -->
    <nav id="bottom-nav" class="bottom-nav hidden">
      <button class="nav-tab" data-screen="dashboard">
        <span class="nav-icon">&#127968;</span>
        <span class="nav-label">Главная</span>
        <span class="nav-dot"></span>
      </button>
      <button class="nav-tab" data-screen="sphere-list">
        <span class="nav-icon">&#9679;</span>
        <span class="nav-label">Сферы</span>
        <span class="nav-dot"></span>
      </button>
      <button class="nav-tab" data-screen="library">
        <span class="nav-icon">&#128218;</span>
        <span class="nav-label">Библиотека</span>
        <span class="nav-dot"></span>
      </button>
      <button class="nav-tab" data-screen="progress">
        <span class="nav-icon">&#128200;</span>
        <span class="nav-label">Прогресс</span>
        <span class="nav-dot"></span>
      </button>
      <button class="nav-tab" data-screen="profile">
        <span class="nav-icon">&#128100;</span>
        <span class="nav-label">Профиль</span>
        <span class="nav-dot"></span>
      </button>
    </nav>
  </div>

  <!-- Оверлей для bottom sheet модальных окон -->
  <div id="modal-overlay" class="modal-overlay hidden" id="modal-overlay"></div>
  <div id="modal-container" class="modal-container"></div>

  <!-- Toast-уведомления -->
  <div id="toast" class="toast" aria-live="polite" aria-atomic="true"></div>

  <!-- Скрипты (порядок важен: data → app) -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.3/Sortable.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
