<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit=cover — убирает белые полосы на iPhone с notch -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0b0b17">
  <title>Портфель жизни</title>

  <!-- Telegram Web App SDK — обязательно до всех скриптов -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Шрифты: Syne для заголовков, DM Sans для текста -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Экран загрузки (виден пока JS инициализируется) -->
  <div id="loading-screen" class="loading-screen">
    <canvas id="stars-canvas" class="stars-canvas"></canvas>
    <div class="loading-content">
      <div class="loading-title">Портфель жизни</div>
      <div class="loading-subtitle">Твой путь к балансу</div>
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>
  <script>
    (function() {
      const canvas = document.getElementById('stars-canvas');
      const ctx = canvas.getContext('2d');
      const W = canvas.width  = window.innerWidth;
      const H = canvas.height = window.innerHeight;

      function star5(x, y, r) {
        ctx.beginPath();
        for (let i = 0; i < 5; i++) {
          const a = (i * 4 * Math.PI / 5) - Math.PI / 2;
          const b = a + 2 * Math.PI / 5;
          i === 0 ? ctx.moveTo(x + r * Math.cos(a), y + r * Math.sin(a))
                  : ctx.lineTo(x + r * Math.cos(a), y + r * Math.sin(a));
          ctx.lineTo(x + r * 0.4 * Math.cos(b), y + r * 0.4 * Math.sin(b));
        }
        ctx.closePath();
      }

      // Крупные 5-лучевые звёзды — вдоль Млечного пути
      const bigStars = Array.from({length: 22}, (_, i) => {
        const t = i / 22;
        return {
          x: W * (0.05 + t * 0.85) + (Math.random() - 0.5) * W * 0.25,
          y: H * (0.04 + t * 0.45) + (Math.random() - 0.5) * H * 0.15,
          r: Math.random() * 7 + 4,
          alpha: Math.random() * 0.4 + 0.6,
          twinkle: Math.random() * 0.018 + 0.008,
          dir: Math.random() > 0.5 ? 1 : -1,
          speed: Math.random() * 0.12 + 0.04
        };
      });

      // Мелкие точки-звёзды
      const dots = Array.from({length: 120}, () => ({
        x: Math.random() * W,
        y: Math.random() * H * 0.72,
        r: Math.random() * 1.5 + 0.3,
        alpha: Math.random() * 0.6 + 0.2,
        twinkle: Math.random() * 0.012 + 0.003,
        dir: Math.random() > 0.5 ? 1 : -1,
        speed: Math.random() * 0.2 + 0.05
      }));

      function drawMountains() {
        // Дальние горы — пики на 72% экрана
        ctx.beginPath();
        ctx.moveTo(-10, H+10);
        ctx.lineTo(-10, H*0.82);
        ctx.bezierCurveTo(W*0.05,H*0.82, W*0.12,H*0.78, W*0.20,H*0.75);
        ctx.bezierCurveTo(W*0.28,H*0.72, W*0.32,H*0.74, W*0.38,H*0.76);
        ctx.bezierCurveTo(W*0.43,H*0.77, W*0.46,H*0.73, W*0.50,H*0.72);
        ctx.bezierCurveTo(W*0.54,H*0.73, W*0.57,H*0.77, W*0.62,H*0.76);
        ctx.bezierCurveTo(W*0.68,H*0.75, W*0.72,H*0.72, W*0.76,H*0.73);
        ctx.bezierCurveTo(W*0.80,H*0.74, W*0.85,H*0.78, W*0.92,H*0.79);
        ctx.bezierCurveTo(W*0.96,H*0.80, W+10,H*0.82, W+10,H*0.82);
        ctx.lineTo(W+10, H+10);
        ctx.closePath();
        const g1 = ctx.createLinearGradient(0, H*0.70, 0, H);
        g1.addColorStop(0, '#0f1a42');
        g1.addColorStop(1, '#060b1e');
        ctx.fillStyle = g1;
        ctx.fill();

        // Ближние горы — пики на 78%
        ctx.beginPath();
        ctx.moveTo(-10, H+10);
        ctx.lineTo(-10, H*0.90);
        ctx.bezierCurveTo(W*0.06,H*0.90, W*0.14,H*0.86, W*0.22,H*0.83);
        ctx.bezierCurveTo(W*0.30,H*0.80, W*0.36,H*0.82, W*0.42,H*0.83);
        ctx.bezierCurveTo(W*0.46,H*0.83, W*0.49,H*0.79, W*0.52,H*0.78);
        ctx.bezierCurveTo(W*0.55,H*0.79, W*0.58,H*0.83, W*0.64,H*0.83);
        ctx.bezierCurveTo(W*0.70,H*0.83, W*0.75,H*0.80, W*0.80,H*0.81);
        ctx.bezierCurveTo(W*0.86,H*0.82, W*0.92,H*0.86, W+10,H*0.88);
        ctx.lineTo(W+10, H+10);
        ctx.closePath();
        const g2 = ctx.createLinearGradient(0, H*0.77, 0, H);
        g2.addColorStop(0, '#07091f');
        g2.addColorStop(1, '#020408');
        ctx.fillStyle = g2;
        ctx.fill();
      }

      function draw() {
        // Небо — светлее, синее
        const sky = ctx.createLinearGradient(0, 0, 0, H);
        sky.addColorStop(0,   '#050d28');
        sky.addColorStop(0.5, '#0a1840');
        sky.addColorStop(1,   '#0d1f4a');
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, W, H);

        // Млечный путь — яркая диагональная полоса
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        // Центр полосы — от верхнего левого к нижнему правому
        const mwGrad = ctx.createLinearGradient(W*0.0, H*0.05, W*0.85, H*0.65);
        mwGrad.addColorStop(0,   'rgba(0,80,200,0)');
        mwGrad.addColorStop(0.25,'rgba(20,120,255,0.35)');
        mwGrad.addColorStop(0.45,'rgba(80,180,255,0.55)');
        mwGrad.addColorStop(0.55,'rgba(120,200,255,0.45)');
        mwGrad.addColorStop(0.75,'rgba(20,100,220,0.25)');
        mwGrad.addColorStop(1,   'rgba(0,60,180,0)');
        ctx.fillStyle = mwGrad;
        ctx.fillRect(0, 0, W, H);

        // Дополнительное яркое ядро Млечного пути
        const core = ctx.createRadialGradient(W*0.25, H*0.35, 0, W*0.25, H*0.35, W*0.35);
        core.addColorStop(0,   'rgba(150,220,255,0.4)');
        core.addColorStop(0.4, 'rgba(80,160,255,0.2)');
        core.addColorStop(1,   'rgba(0,80,200,0)');
        ctx.fillStyle = core;
        ctx.fillRect(0, 0, W, H);
        ctx.restore();

        // Мелкие точки
        dots.forEach(s => {
          s.alpha += s.twinkle * s.dir;
          if (s.alpha >= 0.9 || s.alpha <= 0.1) s.dir *= -1;
          s.y -= s.speed;
          if (s.y < -4) { s.y = H * 0.72; s.x = Math.random() * W; }
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(180,210,255,${s.alpha})`;
          ctx.fill();
        });

        // Крупные звёзды
        bigStars.forEach(s => {
          s.alpha += s.twinkle * s.dir;
          if (s.alpha >= 1 || s.alpha <= 0.3) s.dir *= -1;
          s.y -= s.speed;
          if (s.y < -20) { s.y = H * 0.65; s.x = Math.random() * W; }
          ctx.save();
          ctx.shadowBlur = 30;
          ctx.shadowColor = 'rgba(150,220,255,1)';
          star5(s.x, s.y, s.r);
          const sg = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r);
          sg.addColorStop(0,   `rgba(255,255,255,${s.alpha})`);
          sg.addColorStop(0.3, `rgba(200,235,255,${s.alpha})`);
          sg.addColorStop(0.7, `rgba(100,190,255,${s.alpha * 0.7})`);
          sg.addColorStop(1,   `rgba(60,140,255,0)`);
          ctx.fillStyle = sg;
          ctx.fill();
          // Дополнительный ореол
          ctx.shadowBlur = 40;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r * 0.5, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${s.alpha * 0.9})`;
          ctx.fill();
          ctx.restore();
        });

        drawMountains();
        requestAnimationFrame(draw);
      }
      draw();
    })();
  </script>

  <!-- Основной контейнер приложения (скрыт до инициализации) -->
  <div id="app" class="app hidden">

    <!-- Контейнер для экранов — JS рендерит сюда HTML каждого экрана -->
    <div id="screen-container" class="screen-container"></div>

    <!-- Нижняя навигация (5 табов, скрыта на онбординге) -->
    <nav id="bottom-nav" class="bottom-nav hidden">
      <button class="nav-tab" data-screen="dashboard">
        <span class="nav-icon">&#127968;</span>
        <span class="nav-label">Главная</span>
        <span class="nav-dot"></span>
      </button>
      <button class="nav-tab" data-screen="sphere-list">
        <span class="nav-icon">&#9679;</span>
        <span class="nav-label">Сферы</span>
        <span class="nav-dot"></span>
      </button>
      <button class="nav-tab" data-screen="library">
        <span class="nav-icon">&#128218;</span>
        <span class="nav-label">Библиотека</span>
        <span class="nav-dot"></span>
      </button>
      <button class="nav-tab" data-screen="progress">
        <span class="nav-icon">&#128200;</span>
        <span class="nav-label">Прогресс</span>
        <span class="nav-dot"></span>
      </button>
      <button class="nav-tab" data-screen="profile">
        <span class="nav-icon">&#128100;</span>
        <span class="nav-label">Профиль</span>
        <span class="nav-dot"></span>
      </button>
    </nav>
  </div>

  <!-- Оверлей для bottom sheet модальных окон -->
  <div id="modal-overlay" class="modal-overlay hidden" id="modal-overlay"></div>
  <div id="modal-container" class="modal-container"></div>

  <!-- Toast-уведомления -->
  <div id="toast" class="toast" aria-live="polite" aria-atomic="true"></div>

  <!-- Скрипты (порядок важен: data → app) -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.3/Sortable.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
